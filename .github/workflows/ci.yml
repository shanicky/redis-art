name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            redis-server \
            redis-tools \
            ruby

      - name: Build module
        run: make

      - name: Run ART unit tests
        run: timeout 60s make test

      - name: Run Redis module integration tests
        run: timeout 60s make test-module
